<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ALS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900">ALS <span class="text-pink-600">Admin</span></h1>
            <p class="text-gray-400 text-sm mt-2">Acceso para Administradores</p>
        </div>
        
        <form id="form-login" class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full p-3 rounded-xl bg-gray-50 border border-transparent focus:border-pink-500 outline-none transition-all">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Contraseña</label>
                <input type="password" id="pass" required class="w-full p-3 rounded-xl bg-gray-50 border border-transparent focus:border-pink-500 outline-none transition-all">
            </div>
            <button type="submit" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform mt-4">
                Entrar al Sistema
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="login.js"></script>
</body>
</html>
