<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Ingreso - ALS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen pb-20 font-sans">

    <header class="bg-white p-4 shadow-sm flex items-center gap-4 sticky top-0 z-50">
        <a href="admin.html" class="text-gray-500 hover:text-pink-600 transition-colors">
            <span class="material-icons">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold text-gray-800">Nuevo Artículo</h1>
    </header>

    <main class="p-6 max-w-lg mx-auto">
        <form id="form-agregar" class="space-y-5">
            
            <div class="flex flex-col items-center">
                <label class="w-full h-64 border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center bg-white relative overflow-hidden cursor-pointer hover:bg-gray-50 transition-colors">
                    <div id="preview-placeholder" class="text-center">
                        <span class="material-icons text-5xl text-pink-300">add_a_photo</span>
                        <p class="text-gray-400 text-sm mt-2 font-medium">Tocar para subir foto</p>
                    </div>
                    <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden">
                    <input type="file" id="input-foto" accept="image/*" class="hidden" required>
                </label>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nombre del Artículo</label>
                <input type="text" name="nombre" placeholder="Ej. Vestido de Noche Azul" required
                    class="w-full p-3 mt-1 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-500 focus:outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Tipo</label>
                    <select id="tipo" name="tipo" class="w-full p-3 mt-1 bg-white border border-gray-300 rounded-xl">
                        <option value="Vestido">Vestido</option>
                        <option value="Zapato">Zapato</option>
                        <option value="Bolsa">Bolsa</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                
                <div id="contenedor-talla">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Talla</label>
                    <select id="talla" name="talla" class="w-full p-3 mt-1 bg-white border border-gray-300 rounded-xl font-bold text-gray-800">
                        </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Color</label>
                    <input type="text" id="color" name="color" list="colores-sugeridos" 
                        placeholder="Escribe..." autocomplete="off"
                        class="w-full p-3 mt-1 bg-white border border-gray-300 rounded-xl">
                    
                    <datalist id="colores-sugeridos">
                        <option value="Negro"><option value="Blanco"><option value="Rojo">
                        <option value="Azul Rey"><option value="Verde Esmeralda"><option value="Rosa Palo">
                        <option value="Dorado"><option value="Plateado"><option value="Vino">
                    </datalist>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Precio Base</label>
                    <input type="number" name="precio" placeholder="$" required
                        class="w-full p-3 mt-1 bg-white border border-gray-300 rounded-xl">
                </div>
            </div>

            <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
                <p class="text-xs font-bold text-gray-400 uppercase text-center mb-2">Generado por Sistema</p>
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-[10px] text-gray-400 font-bold">ID ARTÍCULO</label>
                        <input type="text" id="id" name="id" readonly 
                            class="w-full p-2 bg-gray-200 text-gray-600 font-mono text-xs rounded border border-gray-300">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[10px] text-gray-400 font-bold">CÓDIGO</label>
                        <input type="text" id="codigo" name="codigo" readonly 
                            class="w-full p-2 bg-pink-50 text-pink-600 font-mono font-bold text-xs rounded border border-pink-200">
                    </div>
                </div>
            </div>

            <button type="submit" id="btn-guardar" class="w-full bg-gray-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-black transition-all active:scale-95 flex justify-center items-center gap-2 mt-4">
                <span class="material-icons">cloud_upload</span> GUARDAR
            </button>
        </form>
    </main>

    <script src="agregar.js"></script>

</body>
</html>
